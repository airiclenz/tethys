; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
description = Tethys Wireless Sensor

;///////////////////////////////
[env:tethys-sensor]
;///////////////////////////////

platform = atmelavr
framework = arduino

;upload_protocol = atmelice_isp
upload_protocol = avrispmkII
;upload_flags =
;	-D

board = attiny84
board_build.f_cpu = 8000000L
board_fuses.efuse = 0xFF
; hfuse 0xD7 keeps EESAVE programmed (bit 3 = 0) so the pre-flash chip-erase
; preserves EEPROM -- sensor calibration survives same-version re-flashes. Bump
; VERSION/SUBVERSION (wpw_Version.h) to force a re-default when a change alters
; the raw measurement scale.
board_fuses.hfuse = 0xD7
board_fuses.lfuse = 0xE2

lib_deps =
	https://github.com/nRF24/RF24.git
	; eeprom

; upload:
; pio run -t program -e tethys-sensor

; set fuses:
; pio run -t fuses -e tethys-sensor

