[pytest]
# UI tests for the web frontend. Run them with:  cd code/master/web && pytest
# (the Python core/api suites have their own config under code/master).
DJANGO_SETTINGS_MODULE = tethys_web.settings_test
python_files = test_*.py
testpaths = tests
# Put the web/ project root on sys.path so `tethys_web` is importable.
pythonpath = .
