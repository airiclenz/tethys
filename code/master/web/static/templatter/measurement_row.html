
<div
    class="div-row {% cycle table-row-odd table-row-even %}"
    id="idMeasurement{{ id }}">

    <div
        class="div-column div-column-padding col-25"
        id="idMeasurement{{ id }}_id">
        {{ id }}
    </div>
    <div
        class="div-column div-column-padding col-25"
        id="idMeasurement{{ id }}_timestamp">
        {{ timestamp }}
    </div>
    <div
        class="div-column div-column-padding col-25"
        id="idMeasurement{{ id }}_moisture">
        {{ moisture }}
    </div>
    <div
        class="div-column div-column-padding col-25"
        id="idMeasurement{{ id }}_battery">
        {{ battery }}
    </div>
    <div class="div-column div-column-padding col-2">
        <a href="#popup_delete_confirmation_measurements"
           onclick="tethys.measurements.requestRowDelete({{ id }})">
            <div class="button" title="Delete this reading">
                <img src="../static/images/svg/delete.svg" width="20" height="20" />
            </div>
        </a>
    </div>
</div>
