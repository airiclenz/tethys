
<div
    class="div-row {% cycle table-row-odd table-row-even %}"
    id="idAction{{ id }}">

    <div
        class="div-column div-column-padding col-20"
        data-label="ID"
        id="idAction{{ id }}_id">
        {{ id }}
    </div>
    <div
        class="div-column div-column-padding col-20"
        data-label="Type"
        id="idAction{{ id }}_type">
        {{ actionType }}
    </div>
    <div
        class="div-column div-column-padding col-20"
        data-label="Start Time"
        id="idAction{{ id }}_startTime">
        {{ startTime }}
    </div>
    <div
        class="div-column div-column-padding col-20"
        data-label="End Time"
        id="idAction{{ id }}_endTime">
        {{ endTime }}
    </div>
    <div
        class="div-column div-column-padding col-20"
        data-label="Duration"
        id="idAction{{ id }}_duration">
        {{ duration }}
    </div>
    <div class="div-column div-column-padding col-2">
        <a href="#popup_delete_confirmation_actions"
           onclick="tethys.actions.requestRowDelete({{ id }})">
            <div class="button" title="Delete this action">
                <img src="../static/images/svg/delete.svg" width="20" height="20" />
            </div>
        </a>
    </div>
</div>
